workflowExternalId: wf_icapi_data_pipeline
version: '1'

workflowDefinition:
  tasks:

    # 1. Create asset hierarchy
    - externalId: create_asset_hierarchy_task
      type: function
      parameters:
        function:
          externalId: create_asset_hierarchy
          data: {}
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow

    # 2. Contextualize TS to assets
    - externalId: contextualize_ts_assets_task
      type: function
      parameters:
        function:
          externalId: contextualize_ts_assets
          data: {}
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
      dependsOn:
        - externalId: create_asset_hierarchy_task

    # 3. Extract datapoints
    - externalId: icapi_datapoints_extractor_task
      type: function
      parameters:
        function:
          externalId: icapi_datapoints_extractor
          data:
            hours: 1
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
      dependsOn:
        - externalId: contextualize_ts_assets_task

    # 4. Calculate OEE timeseries
    - externalId: oee_timeseries_task
      type: function
      parameters:
        function:
          externalId: oee_timeseries
          data: {}
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
      dependsOn:
        - externalId: icapi_datapoints_extractor_task